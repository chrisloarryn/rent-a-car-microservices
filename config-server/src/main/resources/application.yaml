spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        default-label: server-config
        git:
          uri: https://github.com/andresrodriguez55/rent-a-car-microservices
springdoc:
  group-configs:
    - group: ${spring.application.name}
      paths-to-match:
        - /api/**
        - /actuator/**
server:
  port: 8888
management:
  endpoints:
    web:
      exposure:
        include: health,info,env
