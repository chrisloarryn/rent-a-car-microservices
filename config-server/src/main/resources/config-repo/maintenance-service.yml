server:
  port: ${MAINTENANCE_SERVICE_PORT:9012}
spring:
  datasource:
    url: jdbc:mysql://${MAINTENANCE_DB_HOST:localhost}:${MAINTENANCE_DB_PORT:3307}/${MAINTENANCE_DB_NAME:maintenancedb}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MAINTENANCE_DB_USERNAME:mysql}
    password: ${MAINTENANCE_DB_PASSWORD:mysql}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${MAINTENANCE_JPA_DDL_AUTO:update}
