application:
  security:
    allowed-origins:
      - ${ALLOWED_ORIGIN_PRIMARY:http://localhost:3000}
      - ${ALLOWED_ORIGIN_GATEWAY:http://localhost:9010}
    internal-api-key: ${INTERNAL_API_KEY:rent-a-car-internal-dev-key}
    basic:
      user:
        username: ${APP_USER_USERNAME:app-user}
        password: ${APP_USER_PASSWORD:app-user-pass}
        roles:
          - user
      admin:
        username: ${APP_ADMIN_USERNAME:app-admin}
        password: ${APP_ADMIN_PASSWORD:app-admin-pass}
        roles:
          - admin
          - user
      moderator:
        username: ${APP_MODERATOR_USERNAME:app-moderator}
        password: ${APP_MODERATOR_PASSWORD:app-moderator-pass}
        roles:
          - moderator
          - user
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
  jackson:
    deserialization:
      fail-on-unknown-properties: false
eureka:
  client:
    service-url:
      defaultZone: ${DISCOVERY_SERVER_URL:http://localhost:8761/eureka/}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
