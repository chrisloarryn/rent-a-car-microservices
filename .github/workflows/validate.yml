name: Validate Java Application

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  detect-changed-http-modules:
    runs-on: ubuntu-latest
    outputs:
      modules_json: ${{ steps.detect.outputs.modules_json }}
      modules_csv: ${{ steps.detect.outputs.modules_csv }}
      has_modules: ${{ steps.detect.outputs.has_modules }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed HTTP modules
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base_sha="$BASE_SHA"
          else
            base_sha="$BEFORE_SHA"
            if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
              base_sha="$(git rev-list --max-parents=0 HEAD)"
            fi
          fi

          changed_files="$(git diff --name-only "$base_sha" "$HEAD_SHA")"
          printf '%s\n' "$changed_files" > changed-files.txt

          python3 - <<'PY'
          import json
          from pathlib import Path

          modules = [
              "api-gateway",
              "config-server",
              "discovery-server",
              "inventory-service",
              "maintenance-service",
              "payment-service",
              "rental-service",
              "invoice-service",
              "filter-service",
          ]

          changed_files = [line.strip() for line in Path("changed-files.txt").read_text(encoding="utf-8").splitlines() if line.strip()]
          run_all = any(path == "pom.xml" or path.startswith("common-package/") for path in changed_files)
          selected = modules[:] if run_all else [module for module in modules if any(path.startswith(module + "/") for path in changed_files)]

          Path("detect-outputs.txt").write_text(
              "\n".join([
                  f"modules_json={json.dumps(selected)}",
                  f"modules_csv={','.join(selected)}",
                  f"has_modules={'true' if selected else 'false'}",
              ]) + "\n",
              encoding="utf-8",
          )
          PY

          cat detect-outputs.txt >> "$GITHUB_OUTPUT"

  unit-tests:
    runs-on: ubuntu-latest
    needs: detect-changed-http-modules
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run unit and integration tests excluding Karate
        id: run-tests
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p target
          set -o pipefail
          ./mvnw --batch-mode test -DexcludedGroups=karate 2>&1 | tee target/unit-tests.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Publish unit summary
        if: always()
        run: |
          python3 .github/scripts/publish_validation_summary.py unit \
            --repo-root . \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: |
            **/target/surefire-reports
            target/unit-tests.log
          if-no-files-found: ignore

      - name: Fail if unit tests failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  coverage-quality-gate:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run coverage quality gate
        id: run-tests
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p target
          set -o pipefail
          ./mvnw --batch-mode verify -Pcoverage -DexcludedGroups=karate 2>&1 | tee target/coverage.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Publish coverage summary
        if: always()
        run: |
          python3 .github/scripts/publish_validation_summary.py coverage \
            --repo-root . \
            --minimum-ratio 0.90 \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            **/target/site/jacoco
            target/coverage.log
          if-no-files-found: ignore

      - name: Fail if coverage gate failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  karate-contract-tests:
    runs-on: ubuntu-latest
    needs:
      - detect-changed-http-modules
      - unit-tests
    if: needs.detect-changed-http-modules.outputs.has_modules == 'true'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changed-http-modules.outputs.modules_json) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run Karate contract tests
        id: run-tests
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p "${{ matrix.module }}/target"
          set -o pipefail
          ./mvnw --batch-mode -pl "${{ matrix.module }}" -am -Dtest=karate.ApiContractsKarateTest -Dsurefire.failIfNoSpecifiedTests=false test 2>&1 | tee "${{ matrix.module }}/target/karate-console.log"
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Publish Karate summary
        if: always()
        run: |
          python3 .github/scripts/publish_validation_summary.py karate \
            --repo-root . \
            --module "${{ matrix.module }}" \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Upload Karate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-report-${{ matrix.module }}
          path: |
            ${{ matrix.module }}/target/karate-reports
            ${{ matrix.module }}/target/karate-console.log
          if-no-files-found: ignore

      - name: Fail if Karate tests failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  gatling-performance-tests:
    runs-on: ubuntu-latest
    needs:
      - detect-changed-http-modules
      - unit-tests
    if: needs.detect-changed-http-modules.outputs.has_modules == 'true'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changed-http-modules.outputs.modules_json) }}
    services:
      mongo:
        image: mongo:8
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run Gatling performance tests
        id: run-tests
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p "${{ matrix.module }}/target"
          set -o pipefail
          ./mvnw --batch-mode -pl "${{ matrix.module }}" -am -Pgatling verify -DskipTests=true 2>&1 | tee "${{ matrix.module }}/target/gatling-console.log"
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Publish Gatling summary
        if: always()
        run: |
          python3 .github/scripts/publish_validation_summary.py gatling \
            --repo-root . \
            --module "${{ matrix.module }}" \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Upload Gatling report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-report-${{ matrix.module }}
          path: |
            ${{ matrix.module }}/target/gatling
            ${{ matrix.module }}/target/gatling-console.log
          if-no-files-found: ignore

      - name: Fail if Gatling tests failed
        if: always() && steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  validation-summary:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - detect-changed-http-modules
      - unit-tests
      - coverage-quality-gate
      - karate-contract-tests
      - gatling-performance-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download validation artifacts
        if: always()
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish workflow summary
        env:
          CHANGED_MODULES: ${{ needs.detect-changed-http-modules.outputs.modules_csv }}
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          COVERAGE_RESULT: ${{ needs.coverage-quality-gate.result }}
          KARATE_RESULT: ${{ needs.karate-contract-tests.result }}
          GATLING_RESULT: ${{ needs.gatling-performance-tests.result }}
        shell: bash
        run: |
          status_label() {
            case "$1" in
              success) echo "PASS" ;;
              failure) echo "FAIL" ;;
              skipped) echo "SKIPPED" ;;
              cancelled) echo "CANCELLED" ;;
              *) echo "UNKNOWN" ;;
            esac
          }

          {
            echo "## Validation Summary"
            echo ""
            echo "| Stage | Result | Highlights |"
            echo "| --- | --- | --- |"
            echo "| Changed HTTP modules | n/a | ${CHANGED_MODULES:-none} |"
            echo "| Unit and integration | $(status_label "${UNIT_RESULT}") | Entire monorepo with Karate excluded |"
            echo "| Coverage quality gate | $(status_label "${COVERAGE_RESULT}") | Entire monorepo at >= 90% line coverage per module |"
            echo "| Karate contracts | $(status_label "${KARATE_RESULT}") | Changed HTTP modules only |"
            echo "| Gatling performance | $(status_label "${GATLING_RESULT}") | Changed HTTP modules only, hard gate |"
            echo ""
            echo "Artifacts:"
            echo "- \`unit-test-report\`"
            echo "- \`coverage-report\`"
            echo "- \`karate-report-<module>\`"
            echo "- \`gatling-report-<module>\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          python3 .github/scripts/publish_validation_summary.py unit --repo-root artifacts --summary-file "$GITHUB_STEP_SUMMARY" || true
          python3 .github/scripts/publish_validation_summary.py coverage --repo-root artifacts --minimum-ratio 0.90 --summary-file "$GITHUB_STEP_SUMMARY" || true
          python3 .github/scripts/publish_validation_summary.py karate --repo-root artifacts --summary-file "$GITHUB_STEP_SUMMARY" || true
          python3 .github/scripts/publish_validation_summary.py gatling --repo-root artifacts --summary-file "$GITHUB_STEP_SUMMARY" || true
