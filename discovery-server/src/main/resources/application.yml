spring:
  application:
    name: discovery-server
  cloud:
    config:
      profile: prod
  config:
    import: configserver:http://localhost:8888
springdoc:
  group-configs:
    - group: ${spring.application.name}
      paths-to-match:
        - /api/**
        - /actuator/**
management:
  endpoints:
    web:
      exposure:
        include: health,info
