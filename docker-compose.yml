services:
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_ADVERTISED_HOST:-localhost}:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    command: start-dev
    volumes:
      - .:/apt/jboss/keycloak/imports

  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: zipkin
    ports:
      - "9411:9411"

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - grafana_config:/etc/grafana
    networks:
      - monitor-net

  mysql:
    image: mysql:8.4
    container_name: maintenancedb
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MAINTENANCE_DB_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${MAINTENANCE_DB_NAME:-maintenancedb}
      - MYSQL_USER=${MAINTENANCE_DB_USERNAME:-mysql}
      - MYSQL_PASSWORD=${MAINTENANCE_DB_PASSWORD:-mysql}
      - MYSQL_TCP_PORT=${MAINTENANCE_DB_PORT:-3307}
      - VIRTUAL_PORT=${MAINTENANCE_DB_PORT:-3307}
    ports:
      - '${MAINTENANCE_DB_PORT:-3307}:${MAINTENANCE_DB_PORT:-3307}'
    expose:
      - ${MAINTENANCE_DB_PORT:-3307}
    volumes:
      - mysqldb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P${MAINTENANCE_DB_PORT:-3307} -u${MAINTENANCE_DB_USERNAME:-mysql} -p${MAINTENANCE_DB_PASSWORD:-mysql} --silent"]
      interval: 15s
      timeout: 10s
      retries: 10

  inventory-postgres:
    image: postgres:17
    container_name: inventorydb
    environment:
      POSTGRES_DB: ${INVENTORY_DB_NAME:-inventorydb}
      POSTGRES_USER: ${INVENTORY_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${INVENTORY_DB_PASSWORD:-postgres}
    ports:
      - "${INVENTORY_DB_PORT:-5433}:5432"
    volumes:
      - inventorydb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INVENTORY_DB_USERNAME:-postgres} -d ${INVENTORY_DB_NAME:-inventorydb}"]
      interval: 15s
      timeout: 10s
      retries: 10

  payment-postgres:
    image: postgres:17
    container_name: paymentdb
    environment:
      POSTGRES_DB: ${PAYMENT_DB_NAME:-paymentdb}
      POSTGRES_USER: ${PAYMENT_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD:-postgres}
    ports:
      - "${PAYMENT_DB_PORT:-5434}:5432"
    volumes:
      - paymentdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USERNAME:-postgres} -d ${PAYMENT_DB_NAME:-paymentdb}"]
      interval: 15s
      timeout: 10s
      retries: 10

  rental-postgres:
    image: postgres:17
    container_name: rentaldb
    environment:
      POSTGRES_DB: ${RENTAL_DB_NAME:-rentaldb}
      POSTGRES_USER: ${RENTAL_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${RENTAL_DB_PASSWORD:-postgres}
    ports:
      - "${RENTAL_DB_PORT:-5435}:5432"
    volumes:
      - rentaldb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RENTAL_DB_USERNAME:-postgres} -d ${RENTAL_DB_NAME:-rentaldb}"]
      interval: 15s
      timeout: 10s
      retries: 10

  mongodb:
    container_name: turkcell-filterdb
    image: mongo:8.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 })' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  mongodb2:
    container_name: turkcell-invoicedb
    image: mongo:8.0
    command: mongod --port 27018
    ports:
      - "27018:27018"
    volumes:
      - mongodb_data:/data/turkcell-invoicedb
    healthcheck:
      test: ["CMD-SHELL", "mongosh --port 27018 --quiet --eval 'db.runCommand({ ping: 1 })' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  grafana_data:
  grafana_config:
  kafka_data:
  inventorydb_data:
  mongodb_data:
  mysqldb_data:
  paymentdb_data:
  rentaldb_data:

networks:
  monitor-net:
    driver: bridge
