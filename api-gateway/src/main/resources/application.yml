spring:
  application:
    name: api-gateway
  cloud:
    config:
      profile: ${SPRING_CLOUD_CONFIG_PROFILE:dev}
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
springdoc:
  group-configs:
    - group: ${spring.application.name}
      paths-to-match:
        - /api/**
        - /actuator/**
management:
  endpoint:
    gateway:
      access: read-only
  endpoints:
    web:
      exposure:
        include: health,info,gateway
