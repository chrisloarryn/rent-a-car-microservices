spring:
  application:
    name: api-gateway
  cloud:
    config:
      profile: prod
  config:
    import: optional:configserver:http://localhost:8888
springdoc:
  group-configs:
    - group: ${spring.application.name}
      paths-to-match:
        - /api/**
        - /actuator/**
management:
  endpoint:
    gateway:
      access: read-only
  endpoints:
    web:
      exposure:
        include: health,info,gateway
